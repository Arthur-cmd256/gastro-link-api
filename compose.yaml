services:
  mysql:
    image: 'mysql:latest'
    restart: on-failure
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gastro_link
      MYSQL_USER: myuser
      MYSQL_PASSWORD: secret
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
volumes:
    mysql_data:



spring:
  application:
    name: gastro-link-api
  datasource:
    # Variáveis de ambiente (Docker/`.env`) com fallback para valores padrão
    url: "jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:gastro_link"
    username: ${MYSQL_USER:myuser}
    password: ${MYSQL_PASSWORD:secret}
  jpa:
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
        format_sql: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production}
  expiration: ${JWT_EXPIRATION:86400000} # Padrão: 24 horas em milissegundos
